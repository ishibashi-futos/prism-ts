name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  bun:
    name: Bun sanity + runtime
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Sanity
        run: bun run sanity

      - name: Bun runtime test route
        run: bun run test:runtime:bun

  node:
    name: Node runtime (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Node runtime test route
        run: node ./node_modules/vitest/vitest.mjs run --config vitest.node.config.ts

  web:
    name: Web runtime (Chromium)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install browser binaries
        run: npx playwright install --with-deps chromium

      - name: Web runtime test route
        run: node ./node_modules/vitest/vitest.mjs run --config vitest.web.config.mjs
